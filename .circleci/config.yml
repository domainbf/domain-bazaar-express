# Auto-generated + manually extended for SEO gate.
version: 2.1
orbs:
  node: circleci/node@5
jobs:
  build-node:
    executor: node/default
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Generate sitemap.xml
          command: npm run seo:sitemap
      - run:
          name: Validate JSON-LD (block on error)
          command: npm run seo:validate
      - run:
          name: Build
          command: npm run build
      - store_artifacts:
          path: reports/jsonld-validation.md
          destination: seo/jsonld-validation.md
      - store_artifacts:
          path: public/sitemap.xml
          destination: seo/sitemap.xml
      - run:
          name: Collect build output
          command: mkdir -p ~/artifacts && cp -R dist ~/artifacts 2>/dev/null || true
      - store_artifacts:
          path: ~/artifacts
          destination: node-build
  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: deploy
          command: '#e.g. ./deploy.sh'
workflows:
  build:
    jobs:
      - build-node
